# Robot catalog for the processing pipeline.
#
# Each entry maps a robot-viewer model ID to its upstream robot_descriptions
# module and provides metadata for the manifest.
#
# Fields:
#   id:          Unique identifier used in manifest and URLs
#   module:      Python module name in robot_descriptions (provides URDF_PATH)
#   brand:       Manufacturer name (used for sidebar grouping)
#   name:        Display name
#   tipLinks:    End-effector link names (for IK targets)
#   category:    One of: arm, quadruped, humanoid, biped, mobile, hand, dual_arm, drone
#   dof:         Degrees of freedom (optional, validated against URDF)
#   reach:       Workspace radius in meters (optional)
#   weight:      Robot weight in kg (optional)
#   payload:     Max payload in kg (optional)
#   dataSheet:   URL to datasheet (optional)
#   productPage: URL to product page (optional)

robots:

  # ── Universal Robots ──

  - id: universal_robot_ur3
    module: ur3_description
    brand: Universal Robots
    name: UR3
    tipLinks: [tool0]
    category: arm
    dof: 6
    reach: 0.5
    weight: 15
    payload: 3
    productPage: https://www.universal-robots.com/products/ur3-robot/

